# yaml-language-server: $schema=https://raw.githubusercontent.com/lima-vm/lima/master/schemas/lima.yaml.json
# Lima VM for testing Jean headless mode from the current local checkout.
#
# Usage:
#   limactl start --name jean-headless ./lima/jean-headless.yaml
#   limactl shell jean-headless sudo cat /etc/jean-headless.env
#   open "http://127.0.0.1:3456/?token=<JEAN_TOKEN>"
#
# Reinstall the latest local source after host-side changes:
#   limactl shell jean-headless /usr/local/bin/install-jean-local

images:
  - location: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
    arch: "x86_64"

cpus: 4
memory: "8GiB"
disk: "40GiB"

mounts:
  - location: "{{.Dir}}/.."
    mountPoint: "/workspaces/jean"
    writable: true

portForwards:
  - guestPort: 3456
    hostIP: "127.0.0.1"
    hostPort: 3456

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        build-essential \
        ca-certificates \
        curl \
        git \
        libayatana-appindicator3-dev \
        libfuse2 \
        libssl-dev \
        libwebkit2gtk-4.1-dev \
        patchelf \
        pkg-config \
        xdg-utils

      cat >/usr/local/bin/install-jean-local <<'SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail

      export BUN_INSTALL="${HOME}/.bun"
      export PATH="${BUN_INSTALL}/bin:${HOME}/.cargo/bin:${PATH}"

      if ! command -v bun >/dev/null 2>&1; then
        curl -fsSL https://bun.sh/install | bash
      fi

      if ! command -v cargo >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --profile minimal
      fi

      cd /workspaces/jean
      bun install --frozen-lockfile
      bun run build

      cd src-tauri
      cargo build --bin jean-server --profile release-fast

      sudo install -m 0755 target/release-fast/jean-server /usr/local/bin/jean-server
      sudo ln -sf /usr/local/bin/jean-server /usr/local/bin/jean

      if [ ! -f /etc/jean-headless.env ]; then
        token="$(openssl rand -base64 32)"
        sudo tee /etc/jean-headless.env >/dev/null <<ENV
      JEAN_HEADLESS=1
      JEAN_HOST=0.0.0.0
      JEAN_PORT=3456
      JEAN_TOKEN=${token}
      ENV
        sudo chmod 0600 /etc/jean-headless.env
      fi

      sudo tee /etc/systemd/system/jean-headless.service >/dev/null <<'UNIT'
      [Unit]
      Description=Jean headless server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/jean-headless.env
      ExecStart=/usr/local/bin/jean-server
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
      UNIT

      sudo systemctl daemon-reload
      sudo systemctl enable --now jean-headless.service
      sudo systemctl restart jean-headless.service
      SCRIPT
      chmod 0755 /usr/local/bin/install-jean-local

  - mode: user
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      /usr/local/bin/install-jean-local

probes:
  - script: |
      #!/usr/bin/env bash
      set -euo pipefail
      curl -fsS http://127.0.0.1:3456/healthz >/dev/null
    hint: |
      Jean headless did not become healthy yet. Check logs with:
        limactl shell jean-headless journalctl -u jean-headless -n 100 --no-pager

message: |
  Jean headless is running in the VM and forwarded to localhost:3456.

  Get the token:
    limactl shell {{.Name}} sudo sed -n 's/^JEAN_TOKEN=//p' /etc/jean-headless.env

  Open:
    http://127.0.0.1:3456/?token=<token>

  Reinstall latest local source:
    limactl shell {{.Name}} /usr/local/bin/install-jean-local
